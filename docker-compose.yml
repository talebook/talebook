version: "2.4"

services:

  # main service
  talebook:
    restart: always
    image: talebook/talebook
    volumes:
      - /tmp/demo:/data
    ports:
      - "8080:80"
      - "8443:443"
    environment:
      # 如果需要上传ssl证书，请将PUID与PGID设置为0（root用户）
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      # 启动时若本地无书源，则从此 URL 自动拉取一份内置书源（Legado 数组格式）
      - BOOKSOURCE_BUILTIN_URL=https://cdn.jsdmirror.com/gh/XIU2/Yuedu/shuyuan
    depends_on:
      - douban-rs-api

  # optional, for meta plugins
  # please set "http://douban-rs-api" in settings
  douban-rs-api:
    restart: always
    image: ghcr.io/cxfksword/douban-api-rs
